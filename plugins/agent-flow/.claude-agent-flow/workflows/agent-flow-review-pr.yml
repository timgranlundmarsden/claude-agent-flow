# Agent Flow Review PR — Automated LLM-Powered Review of Pull Requests
#
# Runs on every PR. For sync PRs (label "agent-flow-sync"), uses a manifest-aware
# prompt that checks for lost customizations. For all other PRs, performs general
# code review for bugs, security, logic errors, and code quality.
#
# Required secrets: EXTERNAL_REVIEW_API_KEY
# Required vars:    EXTERNAL_REVIEW_MODEL, EXTERNAL_REVIEW_API_BASE_URL
# Optional secrets: AGENT_FLOW_SYNC_TOKEN (for upstream commit history on sync PRs)

name: Agent Flow Review PR

on:
  pull_request:
    types: [opened, synchronize]

# Cancel in-progress runs for the same PR — prevents concurrent runs from
# racing to post/delete each other's inline comments
concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check prerequisites
        id: prereqs
        env:
          EXTERNAL_REVIEW_API_KEY: ${{ secrets.EXTERNAL_REVIEW_API_KEY }}
          EXTERNAL_REVIEW_MODEL: ${{ vars.EXTERNAL_REVIEW_MODEL }}
          EXTERNAL_REVIEW_API_BASE_URL: ${{ vars.EXTERNAL_REVIEW_API_BASE_URL }}
        run: |
          if [[ -z "$EXTERNAL_REVIEW_API_KEY" ]]; then
            echo "prereq_error=EXTERNAL_REVIEW_API_KEY secret is not set. Configure this secret to enable automated reviews." >> "$GITHUB_OUTPUT"
            echo "::error::EXTERNAL_REVIEW_API_KEY secret is not set. PR review cannot run. Configure this secret to enable automated reviews."
            exit 1
          fi
          if [[ -z "$EXTERNAL_REVIEW_MODEL" ]]; then
            echo "prereq_error=EXTERNAL_REVIEW_MODEL variable is not set. Configure this variable (e.g. openai/gpt-4o-mini) to enable automated reviews." >> "$GITHUB_OUTPUT"
            echo "::error::EXTERNAL_REVIEW_MODEL variable is not set. PR review cannot run. Configure this variable (e.g. openai/gpt-4o-mini) to enable automated reviews."
            exit 1
          fi
          if [[ -z "$EXTERNAL_REVIEW_API_BASE_URL" ]]; then
            echo "prereq_error=EXTERNAL_REVIEW_API_BASE_URL variable is not set. Configure this variable to enable automated reviews." >> "$GITHUB_OUTPUT"
            echo "::error::EXTERNAL_REVIEW_API_BASE_URL variable is not set. PR review cannot run. Configure this variable to enable automated reviews."
            exit 1
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Post unavailable comment on missing prerequisites
        if: failure() && steps.prereqs.outputs.prereq_error != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          PREREQ_ERROR: ${{ steps.prereqs.outputs.prereq_error }}
        run: |
          FAIL_BODY=$(printf '<!-- pr-review-bot -->\n## Automated PR Review — :x: UNAVAILABLE\n\n**Reason:** %s\n\nThe automated review could not be completed. Please review manually or re-run the check.\n\n---\n<sub>pr-review-bot</sub>' "$PREREQ_ERROR")
          COMMENT_HTTP=$(jq -n --arg body "$FAIL_BODY" '{body: $body}' | \
            curl -s -w "%{http_code}" -o /dev/null -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments" \
              -d @-) || COMMENT_HTTP="000"
          if [[ "$COMMENT_HTTP" != "201" ]]; then
            echo "::error::Failed to post UNAVAILABLE comment on PR (HTTP ${COMMENT_HTTP:-000})"
          fi

      - name: Fetch PR diff and gather context
        id: context
        if: steps.prereqs.outputs.ready == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AGENT_FLOW_SYNC_TOKEN: ${{ secrets.AGENT_FLOW_SYNC_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          source .claude-agent-flow/scripts/agent-flow-workflow-helpers.sh 2>&1 || true

          # --- Fetch diff ---
          curl -s -L \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.diff" \
            "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER" \
            > /tmp/pr.diff

          DIFF_SIZE=$(wc -c < /tmp/pr.diff)
          echo "Diff size: $DIFF_SIZE bytes"

          if [[ "$DIFF_SIZE" -gt 800000 ]]; then
            head -c 800000 /tmp/pr.diff > /tmp/pr-truncated.diff
            printf '\n\n--- DIFF TRUNCATED (original: %s bytes, showing first 800KB) ---\n' "$DIFF_SIZE" >> /tmp/pr-truncated.diff
            mv /tmp/pr-truncated.diff /tmp/pr.diff
          fi

          # --- Extract changed file paths from diff ---
          CHANGED_FILES=$(grep '^diff --git' /tmp/pr.diff | sed 's|diff --git a/.* b/||' | sort -u)

          # --- Read manifest ---
          MANIFEST_EXCERPT=""
          if [[ -f .claude-agent-flow/repo-sync-manifest.yml ]]; then
            MANIFEST_EXCERPT=$(cat .claude-agent-flow/repo-sync-manifest.yml)
          fi

          # --- Classify files ---
          CLASSIFICATION=""
          while IFS= read -r filepath; do
            [[ -z "$filepath" ]] && continue
            FILE_TYPE="unknown"

            if echo "$filepath" | grep -qE '^\.claude/agents/.*\.md$' ||
               echo "$filepath" | grep -qE '^\.claude/commands/.*\.md$' ||
               echo "$filepath" | grep -qE '^\.claude/skills/' ||
               echo "$filepath" | grep -qE '^\.claude/hooks/' ||
               echo "$filepath" | grep -qE '^\.claude-agent-flow/bin/mergiraf-' ||
               echo "$filepath" | grep -qE '^\.claude-agent-flow/' ||
               echo "$filepath" | grep -qE '^\.github/workflows/agent-flow.*\.yml$'; then
              FILE_TYPE="managed (source always wins)"
            fi

            if [[ "$filepath" == "CLAUDE.md" ]]; then
              FILE_TYPE="merge: section-patch"
            elif [[ "$filepath" == ".claude/settings.json" ]]; then
              FILE_TYPE="merge: json-deep-merge"
            elif [[ "$filepath" == ".gitignore" || "$filepath" == ".gitattributes" ]]; then
              FILE_TYPE="merge: append-missing"
            elif [[ "$filepath" == "backlog/config.yml" ]]; then
              FILE_TYPE="merge: template"
            elif [[ "$filepath" == ".mcp.json" ]]; then
              FILE_TYPE="merge: json-deep-merge"
            fi

            CLASSIFICATION="${CLASSIFICATION}| \`${filepath}\` | ${FILE_TYPE} |"$'\n'
          done <<< "$CHANGED_FILES"

          # --- Fetch main-branch content for merge files ---
          MAIN_CONTEXT=""
          while IFS= read -r filepath; do
            [[ -z "$filepath" ]] && continue
            if [[ "$filepath" == "CLAUDE.md" || "$filepath" == ".claude/settings.json" ||
                  "$filepath" == ".gitignore" || "$filepath" == ".gitattributes" ||
                  "$filepath" == ".mcp.json" || "$filepath" == "backlog/config.yml" ]]; then
              RAW_B64=$(curl -s \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/$REPO/contents/$filepath?ref=main" \
                | jq -r '.content // empty')
              CONTENT=""
              if [[ -n "$RAW_B64" ]]; then
                CONTENT=$(echo "$RAW_B64" | base64 -d 2>&1 | head -c 50000)
              fi
              if [[ -n "$CONTENT" ]]; then
                MAIN_CONTEXT="${MAIN_CONTEXT}"$'\n'"### ${filepath} (current main branch)"$'\n''```'$'\n'"${CONTENT}"$'\n''```'$'\n'
              fi
            fi
          done <<< "$CHANGED_FILES"

          # --- Fetch upstream commit history (best-effort) ---
          UPSTREAM_HISTORY="Not available"
          PR_BODY=$(jq -r '.pull_request.body // ""' "$GITHUB_EVENT_PATH")
          NEW_SHA=$(echo "$PR_BODY" | grep -oE 'Source commit: [a-f0-9]+' | sed 's/Source commit: //' || true)
          OLD_SHA=""
          if [[ -f .claude-agent-flow/sync-state.json ]]; then
            OLD_SHA=$(jq -r '.source_commit // empty' .claude-agent-flow/sync-state.json)
          fi
          SOURCE_REPO=""
          if [[ -f .claude-agent-flow/repo-sync-manifest.yml ]]; then
            SOURCE_REPO=$(grep 'source_repo:' .claude-agent-flow/repo-sync-manifest.yml | sed 's/.*source_repo: *"*//' | sed 's/"*$//' | tr -d ' ')
          fi

          if [[ -n "$NEW_SHA" && -n "$OLD_SHA" && -n "$SOURCE_REPO" && -n "$AGENT_FLOW_SYNC_TOKEN" ]]; then
            COMPARE_RESULT=$(curl -s \
              -H "Authorization: token $AGENT_FLOW_SYNC_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$SOURCE_REPO/compare/${OLD_SHA}...${NEW_SHA}" 2>&1 || true)
            if echo "$COMPARE_RESULT" | jq -e '.commits' > /tmp/compare-check.txt 2>&1; then
              UPSTREAM_HISTORY=$(echo "$COMPARE_RESULT" | jq -r '[.commits[] | "\(.sha[0:7]) \(.commit.message | split("\n")[0])"] | join("\n")')
              [[ -z "$UPSTREAM_HISTORY" ]] && UPSTREAM_HISTORY="No commits found between ${OLD_SHA:0:7} and ${NEW_SHA:0:7}"
            fi
          fi

          # --- Write context files ---
          printf '%s' "$CLASSIFICATION" > /tmp/file-classification.txt
          printf '%s' "$MAIN_CONTEXT" > /tmp/main-context.txt
          printf '%s' "$UPSTREAM_HISTORY" > /tmp/upstream-history.txt
          printf '%s' "$MANIFEST_EXCERPT" > /tmp/manifest.txt

      - name: Call external LLM for review
        id: llm
        if: steps.prereqs.outputs.ready == 'true' && steps.context.outcome == 'success'
        env:
          EXTERNAL_REVIEW_API_KEY: ${{ secrets.EXTERNAL_REVIEW_API_KEY }}
          EXTERNAL_REVIEW_MODEL: ${{ vars.EXTERNAL_REVIEW_MODEL }}
          EXTERNAL_REVIEW_API_BASE_URL: ${{ vars.EXTERNAL_REVIEW_API_BASE_URL }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          REPO: ${{ github.repository }}
        run: |
          set +e

          PR_BODY=$(jq -r '.pull_request.body // ""' "$GITHUB_EVENT_PATH")
          IS_SYNC_PR=false
          PR_LABELS=$(jq -r '.pull_request.labels[].name' "$GITHUB_EVENT_PATH" 2>&1 || true)
          if echo "$PR_LABELS" | grep -q "agent-flow-sync"; then
            IS_SYNC_PR=true
          fi

          DIFF_CONTENT=$(cat /tmp/pr.diff)
          FILE_CLASSIFICATION=$(cat /tmp/file-classification.txt)
          MAIN_CONTEXT=$(cat /tmp/main-context.txt)
          UPSTREAM_HISTORY=$(cat /tmp/upstream-history.txt)
          MANIFEST_EXCERPT=$(cat /tmp/manifest.txt)

          JSON_FORMAT='{"verdict":"PASS|WARN|FAIL","summary":"<summary>","concerns":[{"file":"<path>","line":<n>,"severity":"error|warning|info","message":"<text>"}]}'
          JSON_INSTRUCTIONS="Respond with JSON only matching this schema (no markdown fences): ${JSON_FORMAT}. verdict: PASS=no issues, WARN=minor issues non-blocking, FAIL=must fix before merge. IMPORTANT: every concern MUST include a line number from the NEW file version (the + side of the diff). Look at the @@ hunk headers to determine line numbers — the +N in @@ -X,Y +N,M @@ is the starting line, then count forward through non-minus lines. Never use null for line — always provide the specific line number where the issue occurs."

          if [[ "$IS_SYNC_PR" == "true" ]]; then
            SYSTEM_PROMPT="You are an expert code reviewer specializing in agent-flow sync operations. Your job is to review sync PRs that apply managed file updates from an upstream agent-flow repository to a downstream child repo. Focus on: (1) whether any child-specific customizations might be lost, (2) merge strategy correctness for merge-type files, (3) whether the changes look consistent with the upstream commit history, (4) detrimental content removals — explicitly check for important guidance being stripped, test enforcement language being softened or weakened, safety rules removed, documentation sections lost, or operational guardrails deleted. Be precise and actionable. Do not flag managed files for being overwritten — that is expected behavior."
            {
              printf 'Review this sync PR.\n\n'
              printf 'PR: %s #%s in %s\n\n' "$PR_TITLE" "$PR_NUMBER" "$REPO"
              printf 'PR Description:\n%s\n\n' "$PR_BODY"
              printf 'Upstream Commit History:\n%s\n\n' "$UPSTREAM_HISTORY"
              printf 'Manifest:\n```yaml\n%s\n```\n\n' "$MANIFEST_EXCERPT"
              printf 'File Classification:\n| File | Sync Type |\n|------|----------|\n%s\n\n' "$FILE_CLASSIFICATION"
              printf 'Current Main Branch Content (merge files only):\n%s\n\n' "$MAIN_CONTEXT"
              printf 'Diff:\n```diff\n%s\n```\n\n' "$DIFF_CONTENT"
              printf 'Instructions: %s\n' "$JSON_INSTRUCTIONS"
            } > /tmp/user-prompt.txt
          else
            PROMPT_FILE=".claude/skills/external-code-review/external-review-system-prompt.md"
            if [[ ! -f "$PROMPT_FILE" ]]; then
              echo "::error::System prompt file not found: $PROMPT_FILE"
              exit 1
            fi
            SYSTEM_PROMPT=$(cat "$PROMPT_FILE")
            if ! [[ "$SYSTEM_PROMPT" =~ [^[:space:]] ]]; then
              echo "::error::System prompt file is empty or whitespace-only: $PROMPT_FILE"
              exit 1
            fi
            {
              printf 'Review this pull request.\n\n'
              printf 'PR: %s #%s in %s\n\n' "$PR_TITLE" "$PR_NUMBER" "$REPO"
              printf 'PR Description:\n%s\n\n' "$PR_BODY"
              printf 'Diff:\n```diff\n%s\n```\n\n' "$DIFF_CONTENT"
              printf 'Instructions: %s\n' "$JSON_INSTRUCTIONS"
            } > /tmp/user-prompt.txt
          fi

          # Build request body — use --rawfile to avoid argument-size limits on large diffs
          if [[ -n "${PROMPT_FILE:-}" ]]; then
            # Non-sync: copy prompt file directly to preserve exact content (no shell variable lossy step)
            cp "$PROMPT_FILE" /tmp/system-prompt.txt
          else
            # Sync: system prompt is an inline string
            printf '%s' "$SYSTEM_PROMPT" > /tmp/system-prompt.txt
          fi

          # Call shared external review script
          SCRIPT_PATH=".claude/skills/external-code-review/external-review.sh"
          if [[ ! -f "$SCRIPT_PATH" ]]; then
            echo "::error::External review script not found: $SCRIPT_PATH"
            echo "review_status=api_error" >> "$GITHUB_OUTPUT"
            echo "error_detail=Review script missing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          REVIEW_OUTPUT=$(bash "$SCRIPT_PATH" \
            --diff-file /tmp/pr.diff \
            --system-prompt /tmp/system-prompt.txt \
            --user-prompt /tmp/user-prompt.txt \
            --repo-name "$REPO" \
            --response-file /tmp/llm-response.json \
            --suppress-config .claude-agent-flow/external-review-config.yml \
            --suppress-config external-review-config.repo.yml \
            2>/tmp/review-stderr.txt) || {
            STDERR_CONTENT=$(cat /tmp/review-stderr.txt 2>&1 || true)
            echo "::error::External review script failed: $STDERR_CONTENT"
            if echo "$STDERR_CONTENT" | grep -qi "HTTP [0-9]"; then
              echo "review_status=api_error" >> "$GITHUB_OUTPUT"
              echo "error_detail=$STDERR_CONTENT" >> "$GITHUB_OUTPUT"
            elif echo "$STDERR_CONTENT" | grep -qi "could not extract message content"; then
              echo "review_status=empty_response" >> "$GITHUB_OUTPUT"
              echo "error_detail=$STDERR_CONTENT" >> "$GITHUB_OUTPUT"
            elif echo "$STDERR_CONTENT" | grep -qi "failed to parse review JSON"; then
              echo "review_status=invalid_json" >> "$GITHUB_OUTPUT"
              echo "error_detail=$STDERR_CONTENT" >> "$GITHUB_OUTPUT"
            else
              echo "review_status=api_error" >> "$GITHUB_OUTPUT"
              echo "error_detail=$STDERR_CONTENT" >> "$GITHUB_OUTPUT"
            fi
            exit 1
          }

          # Write review JSON for post-processing step
          printf '%s\n' "$REVIEW_OUTPUT" > /tmp/llm-review.json

          VERDICT=$(echo "$REVIEW_OUTPUT" | jq -r '.verdict // "UNKNOWN"')
          CONCERN_COUNT=$(echo "$REVIEW_OUTPUT" | jq -r '.concerns | length')

          # Extract token usage from raw API response (saved by --response-file)
          INPUT_TOKENS=$(jq -r '.usage.prompt_tokens // "unknown"' /tmp/llm-response.json)
          OUTPUT_TOKENS=$(jq -r '.usage.completion_tokens // "unknown"' /tmp/llm-response.json)
          TOTAL_COST=$(jq -r '.usage.total_cost // .usage.cost // empty' /tmp/llm-response.json)
          if [[ -z "$TOTAL_COST" || "$TOTAL_COST" == "null" ]]; then
            GEN_ID=$(jq -r '.id // empty' /tmp/llm-response.json)
            if [[ -n "$GEN_ID" ]]; then
              GEN_COST=$(curl -s \
                -H "Authorization: Bearer $EXTERNAL_REVIEW_API_KEY" \
                "${EXTERNAL_REVIEW_API_BASE_URL}/generation?id=$GEN_ID" \
                | jq -r '.data.total_cost // .data.usage.cost // empty' 2>&1 || true)
              if [[ -n "$GEN_COST" && "$GEN_COST" != "null" ]]; then
                TOTAL_COST="$GEN_COST"
              fi
            fi
          fi
          if [[ -z "$TOTAL_COST" || "$TOTAL_COST" == "null" ]]; then
            TOTAL_COST="unknown"
          fi
          echo "Tokens — input: $INPUT_TOKENS, output: $OUTPUT_TOKENS, cost: \$$TOTAL_COST"

          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
          echo "concern_count=$CONCERN_COUNT" >> "$GITHUB_OUTPUT"
          echo "review_status=success" >> "$GITHUB_OUTPUT"
          echo "input_tokens=$INPUT_TOKENS" >> "$GITHUB_OUTPUT"
          echo "output_tokens=$OUTPUT_TOKENS" >> "$GITHUB_OUTPUT"
          echo "total_cost=$TOTAL_COST" >> "$GITHUB_OUTPUT"

      - name: Post review and enforce verdict
        if: always() && steps.prereqs.outputs.ready == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REVIEW_STATUS: ${{ steps.llm.outputs.review_status }}
          VERDICT: ${{ steps.llm.outputs.verdict }}
          CONCERN_COUNT: ${{ steps.llm.outputs.concern_count }}
          ERROR_DETAIL: ${{ steps.llm.outputs.error_detail }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
          EXTERNAL_REVIEW_MODEL: ${{ vars.EXTERNAL_REVIEW_MODEL }}
          EXTERNAL_REVIEW_API_BASE_URL: ${{ vars.EXTERNAL_REVIEW_API_BASE_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          INPUT_TOKENS: ${{ steps.llm.outputs.input_tokens }}
          OUTPUT_TOKENS: ${{ steps.llm.outputs.output_tokens }}
          TOTAL_COST: ${{ steps.llm.outputs.total_cost }}
          N8N_WEBHOOK_URL: ${{ secrets.N8N_BACKLOG_WEBHOOK_URL }}
          NOTIFY_FROM: ${{ secrets.BACKLOG_NOTIFY_FROM }}
        run: |
          set +e

          # Handle non-success states — post an informational comment, then fail the check
          if [[ "$REVIEW_STATUS" != "success" ]]; then
            FAIL_REASON="Unknown error"
            if [[ "$REVIEW_STATUS" == "api_error" ]]; then
              FAIL_REASON="External review API is unavailable (${ERROR_DETAIL})"
            elif [[ "$REVIEW_STATUS" == "empty_response" ]]; then
              FAIL_REASON="External review API returned an empty response"
            elif [[ "$REVIEW_STATUS" == "invalid_json" ]]; then
              FAIL_REASON="LLM returned unparseable response (${ERROR_DETAIL})"
            fi
            FAIL_BODY=$(printf '<!-- pr-review-bot -->\n## Automated PR Review — :x: UNAVAILABLE\n\n**Reason:** %s\n\nThe automated review could not be completed. Please review manually or re-run the check.\n\n---\n<sub>pr-review-bot</sub>' "$FAIL_REASON")
            COMMENT_HTTP=$(jq -n --arg body "$FAIL_BODY" '{body: $body}' | \
              curl -s -w "%{http_code}" -o /dev/null -X POST \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments" \
                -d @-) || COMMENT_HTTP="000"
            if [[ "$COMMENT_HTTP" != "201" ]]; then
              echo "::error::Failed to post UNAVAILABLE comment on PR (HTTP ${COMMENT_HTTP:-000})"
            fi
            echo "::error::PR review unavailable: $FAIL_REASON"
            exit 1
          fi

          # Normalize file paths — LLM sometimes returns ":path", "./path", " path",
          # or combinations like " :./path". Strip leading whitespace, then ":", then "./"
          jq '(.concerns // []) |= [.[] | .file = (.file // "" | gsub("^\\s+"; "") | ltrimstr(":") | ltrimstr("./") | gsub("^\\s+"; ""))]' \
            /tmp/llm-review.json > /tmp/llm-review-norm.json && \
            mv /tmp/llm-review-norm.json /tmp/llm-review.json

          SUMMARY=$(jq -r '.summary // ""' /tmp/llm-review.json)
          MODEL_DISPLAY="$EXTERNAL_REVIEW_MODEL"

          # --- Dismiss old reviews ONLY now that we have a new review ready ---
          # Collect ALL bot review IDs (active + already dismissed) for comment cleanup
          ALL_BOT_REVIEW_IDS=$(curl -s \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER/reviews?per_page=100" \
            | jq -r '.[] | select(.body | contains("pr-review-bot")) | .id')
          # Fetch reviews once for processing
          REVIEWS_JSON=$(curl -s \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER/reviews?per_page=100")
          # Reviews that can be dismissed (CHANGES_REQUESTED, APPROVED)
          DISMISSABLE_IDS=$(echo "$REVIEWS_JSON" | jq -r '.[] | select(.body | contains("pr-review-bot")) | select(.state == "CHANGES_REQUESTED" or .state == "APPROVED") | .id')
          # COMMENTED reviews can only have their body updated, not dismissed
          COMMENTED_IDS=$(echo "$REVIEWS_JSON" | jq -r '.[] | select(.body | contains("pr-review-bot")) | select(.state == "COMMENTED") | .id')
          for RID in $DISMISSABLE_IDS; do
            curl -s -X PUT \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER/reviews/$RID" \
              -d '{"body":"<!-- pr-review-bot -->\n_This review has been superseded by a newer run._"}' 2>&1 || true
            curl -s -X PUT \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER/reviews/$RID/dismissals" \
              -d '{"message":"Superseded by new review run."}' 2>&1 || true
          done
          for RID in $COMMENTED_IDS; do
            curl -s -X PUT \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER/reviews/$RID" \
              -d '{"body":"<!-- pr-review-bot -->\n_This review has been superseded by a newer run._"}' 2>&1 || true
          done
          # Delete inline comments from ALL old bot reviews (active + dismissed).
          # Uses pull_request_review_id so we never touch comments from a concurrent
          # run's not-yet-posted review.
          for RID in $ALL_BOT_REVIEW_IDS; do
            curl -s \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER/comments?per_page=100" \
              | jq -r --argjson rid "$RID" '.[] | select(.pull_request_review_id == $rid) | .id' \
              | while read -r RCID; do
                  curl -s -X DELETE \
                    -H "Authorization: token $GITHUB_TOKEN" \
                    -H "Accept: application/vnd.github.v3+json" \
                    "https://api.github.com/repos/$REPO/pulls/comments/$RCID" 2>&1 || true
                done
          done
          # Delete old issue comments from this bot
          curl -s \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments?per_page=100" \
            | jq -r '.[] | select(.user.login == "github-actions[bot]" and (.body | startswith("<!-- pr-review-bot -->"))) | .id' \
            | while read -r CID; do
                curl -s -X DELETE \
                  -H "Authorization: token $GITHUB_TOKEN" \
                  -H "Accept: application/vnd.github.v3+json" \
                  "https://api.github.com/repos/$REPO/issues/comments/$CID" 2>&1 || true
              done

          # Count unsuppressed concerns by severity
          ERROR_COUNT=$(jq '[.concerns[] | select(.severity == "error" and (.suppressed | not))] | length' /tmp/llm-review.json)
          WARNING_COUNT=$(jq '[.concerns[] | select(.severity == "warning" and (.suppressed | not))] | length' /tmp/llm-review.json)
          TOTAL_CONCERNS=$(jq '.concerns | length' /tmp/llm-review.json)
          SUPPRESSED_COUNT=$(jq '[.concerns[] | select(.suppressed == true)] | length' /tmp/llm-review.json)

          # Recalculate verdict from unsuppressed error/warning counts
          # Never trust the LLM's verdict field — it may say PASS while listing errors
          if [[ "$ERROR_COUNT" -gt 0 ]]; then
            EFFECTIVE_VERDICT="FAIL"
          elif [[ "$WARNING_COUNT" -gt 0 ]]; then
            EFFECTIVE_VERDICT="WARN"
          else
            EFFECTIVE_VERDICT="PASS"
          fi

          # Build inline comments array — map LLM concerns to GitHub review comments
          # Only include unsuppressed concerns with valid file and line number
          COMMENTS_JSON="[]"
          CONCERN_COUNT_INT="${TOTAL_CONCERNS:-0}"

          if [[ "$CONCERN_COUNT_INT" -gt 0 ]]; then
            while IFS= read -r concern; do
              # Skip suppressed concerns for inline comments
              IS_SUPPRESSED=$(echo "$concern" | jq -r '.suppressed // false')
              [[ "$IS_SUPPRESSED" == "true" ]] && continue
              FILE=$(echo "$concern" | jq -r '.file // empty')
              LINE=$(echo "$concern" | jq -r '.line // empty')
              MSG=$(echo "$concern" | jq -r '.message // empty')
              SEV=$(echo "$concern" | jq -r '.severity // "info"')

              [[ -z "$FILE" || -z "$LINE" || "$LINE" == "null" ]] && continue

              # Map diff line to position for GitHub API
              # Find the hunk position for this file+line in the diff
              POSITION=$(awk -v target_file="$FILE" -v target_line="$LINE" '
                BEGIN { in_file=0; hunk_pos=0; new_line=0; found=0 }
                /^diff --git/ {
                  in_file=0
                  split($0, parts, " b/"); if (parts[2] == target_file) in_file=1
                }
                in_file && /^@@/ {
                  s = $0
                  sub(/.*\+/, "", s)
                  sub(/,.*/, "", s)
                  new_line = s + 0 - 1
                  hunk_pos++
                  next
                }
                in_file && /^\+/ && !(/^\+\+\+/) {
                  new_line++
                  hunk_pos++
                  if (new_line == target_line) { found=1; print hunk_pos; exit }
                }
                in_file && /^ / {
                  new_line++
                  hunk_pos++
                  if (new_line == target_line) { found=1; print hunk_pos; exit }
                }
                in_file && /^-/ && !(/^---/) {
                  hunk_pos++
                }
              ' /tmp/pr.diff)

              [[ -z "$POSITION" ]] && continue

              SEV_ICON="info"
              [[ "$SEV" == "error" ]] && SEV_ICON="error"
              [[ "$SEV" == "warning" ]] && SEV_ICON="warning"

              COMMENT_BODY="**${SEV_ICON}:** ${MSG}"

              NEW_COMMENT=$(jq -n \
                --arg path "$FILE" \
                --argjson position "$POSITION" \
                --arg body "$COMMENT_BODY" \
                '{"path": $path, "position": $position, "body": $body}')

              COMMENTS_JSON=$(echo "$COMMENTS_JSON" | jq --argjson c "$NEW_COMMENT" '. + [$c]')
            done < <(jq -c '.concerns[]' /tmp/llm-review.json 2>&1 || true)
          fi

          # Determine review event type based on effective verdict
          # Note: APPROVE is not used — github-actions[bot] GITHUB_TOKEN cannot
          # approve PRs (returns 422). Use COMMENT for PASS/WARN verdicts.
          REVIEW_EVENT="COMMENT"
          if [[ "$EFFECTIVE_VERDICT" == "FAIL" ]]; then
            REVIEW_EVENT="REQUEST_CHANGES"
          fi

          # Build review body
          VERDICT_EMOJI="info"
          [[ "$EFFECTIVE_VERDICT" == "PASS" ]] && VERDICT_EMOJI="white_check_mark"
          [[ "$EFFECTIVE_VERDICT" == "WARN" ]] && VERDICT_EMOJI="warning"
          [[ "$EFFECTIVE_VERDICT" == "FAIL" ]] && VERDICT_EMOJI="x"

          # Build separate concerns lists by category
          ERRORS_LIST=$(jq -r '[.concerns[] | select(.severity == "error" and (.suppressed | not))] | if length > 0 then .[] | "- **error** `\(.file // "general")`\(if .line != null then " (line \(.line))" else "" end): \(.message)" else empty end' /tmp/llm-review.json 2>&1 || true)
          WARNINGS_LIST=$(jq -r '[.concerns[] | select((.severity == "warning" or .severity == "info") and (.suppressed | not))] | if length > 0 then .[] | "- **\(.severity)** `\(.file // "general")`\(if .line != null then " (line \(.line))" else "" end): \(.message)" else empty end' /tmp/llm-review.json 2>&1 || true)
          # Suppressed concerns are excluded from the review body entirely

          # Build review body with separate sections
          COST_LINE=""
          if [[ "$TOTAL_COST" != "unknown" && -n "$TOTAL_COST" ]]; then
            COST_LINE=$(printf '**Cost:** $%s (%s input + %s output tokens)' "$TOTAL_COST" "${INPUT_TOKENS:-?}" "${OUTPUT_TOKENS:-?}")
          elif [[ "${INPUT_TOKENS:-unknown}" != "unknown" ]]; then
            COST_LINE=$(printf '**Tokens:** %s input + %s output' "${INPUT_TOKENS}" "${OUTPUT_TOKENS:-?}")
          fi
          {
            # Verdict reasoning
            VERDICT_REASON=""
            if [[ "$EFFECTIVE_VERDICT" == "PASS" ]]; then
              VERDICT_REASON="No unsuppressed errors found."
            elif [[ "$EFFECTIVE_VERDICT" == "WARN" ]]; then
              VERDICT_REASON="No blocking errors, but warnings need attention."
            elif [[ "$EFFECTIVE_VERDICT" == "FAIL" ]]; then
              VERDICT_REASON="${ERROR_COUNT} error(s) must be resolved before merging."
            fi

            printf '<!-- pr-review-bot -->\n'
            printf '## Automated PR Review — :%s: %s\n\n' "$VERDICT_EMOJI" "$EFFECTIVE_VERDICT"
            printf '> **Verdict:** %s — %s\n\n' "$EFFECTIVE_VERDICT" "$VERDICT_REASON"
            printf '%s\n\n' "$SUMMARY"
            printf '**Model:** `%s`\n' "$MODEL_DISPLAY"
            TOTAL_CONCERNS="${TOTAL_CONCERNS:-0}"
            ERROR_COUNT="${ERROR_COUNT:-0}"
            WARNING_COUNT="${WARNING_COUNT:-0}"
            SUPPRESSED_COUNT="${SUPPRESSED_COUNT:-0}"
            UNSUPPRESSED_TOTAL=$((TOTAL_CONCERNS - SUPPRESSED_COUNT))
            printf '**Concerns:** %s (%s errors, %s warnings, %s info)\n' "$UNSUPPRESSED_TOTAL" "$ERROR_COUNT" "$WARNING_COUNT" "$((UNSUPPRESSED_TOTAL - ERROR_COUNT - WARNING_COUNT))"
            if [[ -n "$COST_LINE" ]]; then
              printf '%s\n' "$COST_LINE"
            fi
            if [[ -n "$ERRORS_LIST" ]]; then
              printf '\n### :x: Errors\n\n%s\n' "$ERRORS_LIST"
            fi
            if [[ -n "$WARNINGS_LIST" ]]; then
              printf '\n### :warning: Warnings\n\n%s\n' "$WARNINGS_LIST"
            fi
            # Suppressed concerns are not shown — suppression means invisible
          } > /tmp/review-body.txt
          REVIEW_BODY=$(cat /tmp/review-body.txt)

          # Attempt to post review with inline comments
          REVIEW_PAYLOAD=$(jq -n \
            --arg commit_id "$HEAD_SHA" \
            --arg body "$REVIEW_BODY" \
            --arg event "$REVIEW_EVENT" \
            --argjson comments "$COMMENTS_JSON" \
            '{"commit_id": $commit_id, "body": $body, "event": $event, "comments": $comments}')

          echo "$REVIEW_PAYLOAD" > /tmp/review-payload.json
          # Use GITHUB_TOKEN (github-actions[bot]) for review submission — a PAT
          # owned by the PR author cannot submit REQUEST_CHANGES on their own PR.
          REVIEW_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER/reviews" \
            -d @/tmp/review-payload.json)

          REVIEW_HTTP_CODE=$(echo "$REVIEW_RESPONSE" | tail -1)

          if [[ "$REVIEW_HTTP_CODE" == "422" ]]; then
            echo "422 on review with inline comments — retrying with all concerns folded into body"

            # Build fallback body with unsuppressed concerns only
            ALL_CONCERNS_TEXT=""
            if [[ "${CONCERN_COUNT:-0}" -gt 0 ]]; then
              ALL_CONCERNS_TEXT=$(jq -r '.concerns[] | select(.suppressed | not) | "- **\(.severity)** `\(.file // "general")`\(if .line != null then " (line \(.line))" else "" end): \(.message)"' /tmp/llm-review.json 2>&1 || true)
            fi

            {
              printf '<!-- pr-review-bot -->\n'
              printf '## Automated PR Review -- :%s: %s\n\n' "$VERDICT_EMOJI" "$EFFECTIVE_VERDICT"
              printf '%s\n\n' "$SUMMARY"
              printf '**Model:** `%s`\n' "$MODEL_DISPLAY"
              printf '**Concerns found:** %s\n' "${CONCERN_COUNT:-0}"
              if [[ -n "$ALL_CONCERNS_TEXT" ]]; then
                printf '\n### Concerns\n\n%s\n' "$ALL_CONCERNS_TEXT"
              fi
            } > /tmp/fallback-body.txt
            FALLBACK_BODY=$(cat /tmp/fallback-body.txt)

            FALLBACK_PAYLOAD=$(jq -n \
              --arg commit_id "$HEAD_SHA" \
              --arg body "$FALLBACK_BODY" \
              --arg event "$REVIEW_EVENT" \
              '{"commit_id": $commit_id, "body": $body, "event": $event, "comments": []}')

            echo "$FALLBACK_PAYLOAD" > /tmp/fallback-payload.json
            FALLBACK_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER/reviews" \
              -d @/tmp/fallback-payload.json)

            FALLBACK_HTTP_CODE=$(echo "$FALLBACK_RESPONSE" | tail -1)

            if [[ "$FALLBACK_HTTP_CODE" != "200" && "$FALLBACK_HTTP_CODE" != "201" ]]; then
              echo "Fallback review also failed (HTTP $FALLBACK_HTTP_CODE) — posting as issue comment"
              {
                printf '<!-- pr-review-bot -->\n'
                printf '## Automated PR Review -- :%s: %s\n\n' "$VERDICT_EMOJI" "$EFFECTIVE_VERDICT"
                printf '%s\n\n' "$SUMMARY"
                printf '> Note: Could not post as a formal review (HTTP %s). Posting as comment instead.\n\n' "$FALLBACK_HTTP_CODE"
                printf '**Model:** `%s`\n\n' "$MODEL_DISPLAY"
                printf '%s\n' "$ALL_CONCERNS_TEXT"
              } > /tmp/comment-body.txt
              jq -n --rawfile body /tmp/comment-body.txt '{"body": $body}' | \
              curl -s -X POST \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments" \
                -d @- 2>&1 || true
            fi

          elif [[ "$REVIEW_HTTP_CODE" != "200" && "$REVIEW_HTTP_CODE" != "201" ]]; then
            echo "Review API returned HTTP $REVIEW_HTTP_CODE — posting as issue comment"
            ALL_CONCERNS_TEXT=""
            if [[ "${CONCERN_COUNT:-0}" -gt 0 ]]; then
              ALL_CONCERNS_TEXT=$(jq -r '.concerns[] | "- **\(.severity)** `\(.file // "general")`\(if .line != null then " (line \(.line))" else "" end): \(.message)"' /tmp/llm-review.json 2>&1 || true)
            fi
            {
              printf '<!-- pr-review-bot -->\n'
              printf '## Automated PR Review -- :%s: %s\n\n' "$VERDICT_EMOJI" "$EFFECTIVE_VERDICT"
              printf '%s\n\n' "$SUMMARY"
              printf '> Note: Could not post as a formal review (HTTP %s). Posting as comment instead.\n\n' "$REVIEW_HTTP_CODE"
              printf '**Model:** `%s`\n\n' "$MODEL_DISPLAY"
              printf '%s\n' "$ALL_CONCERNS_TEXT"
            } > /tmp/comment-body.txt
            jq -n --rawfile body /tmp/comment-body.txt '{"body": $body}' | \
            curl -s -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments" \
              -d @- 2>&1 || true
          fi

          # Notify via n8n webhook (Telegram)
          if [[ -n "$N8N_WEBHOOK_URL" ]]; then
            PR_URL="https://github.com/$REPO/pull/$PR_NUMBER"
            if [[ "$EFFECTIVE_VERDICT" == "PASS" ]]; then
              NOTIFY_EMOJI="✅"
            elif [[ "$EFFECTIVE_VERDICT" == "WARN" ]]; then
              NOTIFY_EMOJI="⚠️"
            elif [[ "$EFFECTIVE_VERDICT" == "FAIL" ]]; then
              NOTIFY_EMOJI="❌"
            else
              NOTIFY_EMOJI="❓"
            fi
            # HTML-escape PR title to prevent injection
            SAFE_TITLE=$(echo "$PR_TITLE" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
            NOTIFY_BODY=$(printf '%s <b>PR Review: %s</b>\n\n📦 <b>Repo:</b> %s\n📋 <b>PR:</b> #%s — %s\n🤖 <b>Model:</b> %s\n⚡ <b>Concerns:</b> %s (%s errors, %s suppressed)\n🔗 <a href="%s">View PR</a>' \
              "$NOTIFY_EMOJI" "$EFFECTIVE_VERDICT" "$REPO" "$PR_NUMBER" "$SAFE_TITLE" "$MODEL_DISPLAY" "${TOTAL_CONCERNS:-0}" "${ERROR_COUNT:-0}" "${SUPPRESSED_COUNT:-0}" "$PR_URL")
            PAYLOAD=$(jq -n \
              --arg From "${NOTIFY_FROM:-pr-review-bot}" \
              --arg Body "$NOTIFY_BODY" \
              --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              '{From: $From, Body: $Body, timestamp: $timestamp}')
            curl -s -o /dev/null -X POST "$N8N_WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d "$PAYLOAD" || true
          fi

          # Report verdict — workflow always passes (exit 0) to avoid noise.
          # The review result is visible via the posted review comment and
          # Telegram notification. Branch protection uses the review state
          # (REQUEST_CHANGES blocks merge), not the workflow exit code.
          if [[ "$EFFECTIVE_VERDICT" == "FAIL" ]]; then
            echo "::warning::PR review: FAIL. ${ERROR_COUNT} unsuppressed error(s), ${SUPPRESSED_COUNT} suppressed. See review comments."
          elif [[ "$EFFECTIVE_VERDICT" == "WARN" ]]; then
            echo "::warning::PR review: WARN. ${TOTAL_CONCERNS} concern(s), ${SUPPRESSED_COUNT} suppressed. Non-blocking."
          elif [[ "$EFFECTIVE_VERDICT" == "PASS" ]]; then
            echo "PR review: PASS."
          else
            echo "::warning::PR review returned unknown verdict. Treating as non-blocking."
          fi
