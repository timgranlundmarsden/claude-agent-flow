# PR Review Bot Configuration
# Controls which concerns are suppressed from the automated LLM review.
#
# Usage: Add entries to 'suppress' to acknowledge known issues that should
# not block PRs. Each entry needs a file pattern, a reason, and optionally
# a keyword that must appear in the concern message to match.
#
# Example:
#   suppress:
#     - file: "src/legacy/*.js"
#       keyword: "deprecated API"
#       reason: "Legacy code scheduled for removal in Q3"
#     - file: ".github/workflows/deploy.yml"
#       keyword: "hardcoded"
#       reason: "Environment values are intentionally static"
#
# Fields:
#   file:    Exact path or glob pattern (matched with fnmatch)
#   keyword: String that must appear in the concern message (case-insensitive)
#   reason:  Why this is suppressed (shown in review body)
#
# Suppressed concerns still appear in the review body (marked as [suppressed])
# but do NOT count toward the error threshold that blocks the PR.

