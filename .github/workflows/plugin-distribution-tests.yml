# Plugin Distribution Tests — validates the published plugin package is sound
#
# Runs on PRs and pushes to main. Checks structure, required files,
# no leaked master-only files, valid JSON, and no unresolved placeholders.
# Designed for the root-level plugin repo layout.
# In the master repo this workflow is a no-op (paths filter won't match).

name: Plugin Distribution Tests

on:
  pull_request:
    branches: [main]
    paths:
      - '.claude/**'
      - '.claude-plugin/**'
      - '.claude-agent-flow/**'
      - 'install.sh'
      - 'CLAUDE.md'
      - '.mcp.json'
      - '.gitattributes'
      - 'external-review-config.repo.yml'
      - 'backlog/config.yml'
  push:
    branches: [main]
    paths:
      - '.claude/**'
      - '.claude-plugin/**'
      - '.claude-agent-flow/**'
      - 'install.sh'
      - 'CLAUDE.md'
      - '.mcp.json'
      - '.gitattributes'
      - 'external-review-config.repo.yml'
      - 'backlog/config.yml'

permissions:
  contents: read

jobs:
  skip-in-forks:
    if: github.repository != 'timgranlundmarsden/claude-agent-flow'
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Skipping: this workflow only runs in timgranlundmarsden/claude-agent-flow."
          echo "Detected: ${{ github.repository }}"

  validate:
    if: github.repository == 'timgranlundmarsden/claude-agent-flow'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq

      # ── Structure checks ─────────────────────────────────────────

      - name: Required directories exist
        run: |
          failed=0
          for dir in agents commands skills .claude-plugin .claude-agent-flow; do
            if [[ ! -d "$dir" ]]; then
              echo "FAIL: missing directory $dir"
              failed=1
            fi
          done
          exit $failed

      - name: Required files exist
        run: |
          failed=0
          files=(
            ".claude-plugin/plugin.json"
            ".claude/settings.json"
            ".claude-agent-flow/repo-sync-manifest.yml"
            ".claude-agent-flow/install-manifest.yml"
            ".claude-agent-flow/templates/CLAUDE.md.managed"
            ".claude-agent-flow/templates/.mcp.json"
            "install.sh"
            "README.md"
            "CHANGELOG.md"
            "LICENSE"
          )
          for f in "${files[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "FAIL: missing file $f"
              failed=1
            fi
          done
          exit $failed

      - name: hooks/hooks.json exists
        run: |
          if [[ ! -f "hooks/hooks.json" ]]; then
            echo "FAIL: missing hooks/hooks.json"
            exit 1
          fi
          echo "OK: hooks/hooks.json present"

      - name: compat symlinks exist under .claude/
        run: |
          failed=0
          for dir in agents commands skills; do
            if [[ ! -L ".claude/$dir" ]]; then
              echo "FAIL: .claude/$dir is not a symlink"
              failed=1
            fi
          done
          exit $failed

      # ── Master-only files must NOT be present ─────────────────────

      - name: No master-only files leaked
        run: |
          failed=0
          leaked=(
            ".claude/commands/plugin-repo-sync.md"
            ".claude-agent-flow/scripts/publish-plugin-repo-sync.sh"
            ".claude-agent-flow/docs/plugin-repo-sync.md"
            ".claude-agent-flow/docs/plugin-repo-sync-migration.md"
            ".claude-agent-flow/publish-plugin-manifest.yml"
          )
          for f in "${leaked[@]}"; do
            if [[ -f "$f" ]]; then
              echo "FAIL: master-only file leaked: $f"
              failed=1
            fi
          done
          exit $failed

      # ── JSON validation ──────────────────────────────────────────

      - name: plugin.json is valid
        run: |
          jq empty ".claude-plugin/plugin.json"
          # Check required fields
          for field in name description version; do
            val=$(jq -r ".$field // empty" ".claude-plugin/plugin.json")
            if [[ -z "$val" ]]; then
              echo "FAIL: plugin.json missing required field: $field"
              exit 1
            fi
          done
          echo "OK: plugin.json is valid with required fields"

      - name: settings.json is valid
        run: jq empty ".claude/settings.json"

      # ── Placeholder checks ────────────────────────────────────────

      - name: No unresolved CHANGEME placeholders
        run: |
          matches=$(grep -r "CHANGEME" --include='*.md' --include='*.yml' --include='*.json' --include='*.sh' \
            --exclude-dir='templates' --exclude-dir='scripts' --exclude-dir='tests' --exclude-dir='fixtures' \
            .claude .claude-plugin .claude-agent-flow README.md CHANGELOG.md install.sh 2>/dev/null || true)
          if [[ -n "$matches" ]]; then
            echo "FAIL: unresolved CHANGEME placeholders found:"
            echo "$matches"
            exit 1
          fi
          echo "OK: no CHANGEME placeholders"

      - name: repo-sync-manifest.yml is anonymized
        run: |
          manifest=".claude-agent-flow/repo-sync-manifest.yml"
          failed=0
          source_repo=$(grep '^source_repo:' "$manifest" | sed 's/source_repo: *//;s/"//g')
          if [[ "$source_repo" != "YOUR-ORG/your-source-repo" ]]; then
            echo "FAIL: source_repo is not anonymized: $source_repo"
            failed=1
          fi
          while IFS= read -r repo_val; do
            if [[ ! "$repo_val" =~ ^YOUR-ORG/your-target-repo-[0-9]+$ ]]; then
              echo "FAIL: target repo is not anonymized: $repo_val"
              failed=1
            fi
          done < <(grep '^ *- *repo:' "$manifest" | sed "s/.*repo: *//;s/\"//g")
          [[ $failed -eq 0 ]] && echo "OK: repo-sync-manifest.yml is anonymized"
          exit $failed

      # ── New root-level files from repo_mappings ───────────────────

      - name: New root-level files exist after sync
        run: |
          failed=0
          files=(
            "CLAUDE.md"
            ".mcp.json"
            ".gitattributes"
            "external-review-config.repo.yml"
            "backlog/config.yml"
          )
          for f in "${files[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "FAIL: missing synced root file: $f"
              failed=1
            fi
          done
          exit $failed

      # ── Runtime workflow files in both targets ────────────────────

      - name: Runtime workflows exist in .github/workflows/
        run: |
          failed=0
          workflows=(
            "agent-flow-backlog-notify.yml"
            "agent-flow-downstream.yml"
            "agent-flow-review-pr.yml"
            "agent-flow-tests.yml"
            "agent-flow-upstream.yml"
            "agent-flow-auto-merge-planning.yml"
          )
          for f in "${workflows[@]}"; do
            if [[ ! -f ".github/workflows/$f" ]]; then
              echo "FAIL: missing .github/workflows/$f"
              failed=1
            fi
          done
          exit $failed

      # ── Content sanity checks ─────────────────────────────────────

      - name: Agents directory has content
        run: |
          count=$(find "agents" -name '*.md' | wc -l)
          if [[ "$count" -lt 1 ]]; then
            echo "FAIL: no agent definitions found"
            exit 1
          fi
          echo "OK: $count agent(s) found"

      - name: Commands directory has content
        run: |
          count=$(find "commands" -name '*.md' | wc -l)
          if [[ "$count" -lt 1 ]]; then
            echo "FAIL: no command definitions found"
            exit 1
          fi
          echo "OK: $count command(s) found"

      - name: Skills directory has content
        run: |
          count=$(find "skills" -name 'SKILL.md' | wc -l)
          if [[ "$count" -lt 1 ]]; then
            echo "FAIL: no skill definitions found"
            exit 1
          fi
          echo "OK: $count skill(s) found"

      - name: Required CI workflows exist
        run: |
          failed=0
          workflows=(
            ".github/workflows/plugin-distribution-tests.yml"
          )
          for f in "${workflows[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "FAIL: missing workflow $f"
              failed=1
            fi
          done
          exit $failed

      - name: install.sh is executable or has shebang
        run: |
          if head -1 install.sh | grep -q '^#!/'; then
            echo "OK: install.sh has shebang"
          else
            echo "FAIL: install.sh missing shebang line"
            exit 1
          fi

      # ── No secrets leaked ─────────────────────────────────────────

      - name: No .env or credential files
        run: |
          failed=0
          for pattern in .env .env.local credentials.json service-account.json; do
            found=$(find . -maxdepth 2 -name "$pattern" -not -path './.git/*' 2>/dev/null)
            if [[ -n "$found" ]]; then
              echo "FAIL: potential secret file found: $found"
              failed=1
            fi
          done
          exit $failed
