name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  skip-in-forks:
    if: github.repository != 'timgranlundmarsden/claude-agent-flow'
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Skipping: this workflow only runs in timgranlundmarsden/claude-agent-flow."
          echo "Detected: ${{ github.repository }}"

  deploy:
    if: github.repository == 'timgranlundmarsden/claude-agent-flow'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect docs path
        id: docs
        run: |
          if [ -d docs/public ]; then
            echo "path=docs/public" >> "$GITHUB_OUTPUT"
          else
            echo "path=docs" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ steps.docs.outputs.path }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
